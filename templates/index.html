<html>
    <head>
        <meta charset="UTF-8">
        <title>Snake Game</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" >
        <link rel="stylesheet" href="../static/css/styles.css" type="text/css">
    </head>
    
    <body>
        <canvas id="game" height="450px" width="450px" style="border:2px solid;"></canvas>
        <script src="../static/js/data.js"></script>
        <script src="../static/js/script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!--Basic Start Modal-->
    <div class="modal fade show" id="startModal" tabindex="-1" style="display:block;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content p-3">

        <div class="modal-header">
            <h5 class="modal-title">Snake Game</h5>
        </div>

        <div class="modal-body">

            <div class="mb-3">
            <label class="form-label">Enter Username</label>
            <input type="text" id="username" class="form-control" placeholder="Your name">
            </div>

            <div class="mb-3">
                <label class="form-label">Select Mode</label>
                    <select id="mode" class="form-select">
                        <option value="classic">Classic</option>
                        <option value="cyberpunk">Cyberpunk</option>
                    </select>
            </div>

            <div class="d-flex justify-content-between">
                <button class="btn btn-info" id="rulesbtn">Rules</button>
                <button class="btn btn-primary" id="startbtn">Start Game</button>
            </div>

            <div id="rulesBox" class="mt-3 d-none">
            <ul>
                <li>Use arrow keys to move the snake</li>
                <li>Eat food to grow</li>
                <li>Avoid hitting walls or yourself</li>
                <li>Score increases with each food</li>
            </ul>
            </div>

        </div>

        </div>
    </div>
    </div>

    </body>
</html>
